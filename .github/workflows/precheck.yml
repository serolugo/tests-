name: SemiCoLab Precheck

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  precheck:
    runs-on: ubuntu-latest
    if: github.repository != 'MifralTech/semicolab-precheck'

    steps:
      # ── Checkout tile repo ────────────────────────────────────────────────
      - name: Checkout tile repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Install OSS CAD Suite ─────────────────────────────────────────────
      - name: Install OSS CAD Suite
        run: |
          wget -q https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2024-11-26/oss-cad-suite-linux-x64-20241126.tgz
          tar -xf oss-cad-suite-linux-x64-20241126.tgz
          echo "$PWD/oss-cad-suite/bin" >> $GITHUB_PATH
          echo "$PWD/oss-cad-suite/lib" >> $GITHUB_PATH

      # ── Install Python dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: |
          sudo apt-get install -y -q libpango-1.0-0 libpangoft2-1.0-0
          pip install pyyaml weasyprint markdown

      # ── Install Node.js + netlistsvg ──────────────────────────────────────
      - name: Install netlistsvg
        run: npm install -g netlistsvg

      # ── Clone precheck engine ─────────────────────────────────────────────
      - name: Clone precheck engine
        run: git clone https://github.com/serolugo/semicolab-precheck-engine.git _engine

      # ── Run precheck ──────────────────────────────────────────────────────
      - name: Run precheck
        run: |
          python _engine/veriflow/cli.py precheck \
            --repo . \
            --run-number ${{ github.run_number }} \
            --commit ${{ github.sha }} \
            --author "${{ github.actor }}"

      # ── Commit results (always, even on failure) ──────────────────────────
      - name: Commit results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ README.md
          git diff --cached --quiet || \
            git commit -m "[skip ci] run-${{ github.run_number }} precheck results"
          git push

      # ── (FUTURE) Submit to semicolab-registry ────────────────────────────
      # Uncomment when registry integration is ready.

      #     curl -X POST \
      #       -H "Authorization: token ${{ secrets.REGISTRY_TOKEN }}" \
      #       -H "Accept: application/vnd.github.v3+json" \
      #       https://api.github.com/repos/MifralTech/semicolab-registry/issues \
      #       -d '{
      #         "title": "Tile Submission: ${{ github.event.repository.name }}",
      #         "body":  "repo: ${{ github.repository }}\ncommit: ${{ github.sha }}"
      #       }'

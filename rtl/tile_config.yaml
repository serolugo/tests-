tile_name: "32-bit Counter"
tile_author: "Sebastian Lugo"
top_module: "counter_tile"
version: "1.0.0"

description: |
  32-bit counter. Increments by data_reg_a when enabled.
  Can be cleared synchronously via csr_in[1].

ports: |
  csr_in[0]  - count enable
  csr_in[1]  - synchronous clear
  data_reg_a - increment value (32-bit)
  data_reg_b - unused
  data_reg_c - current count value (32-bit)
  csr_out    - mirrors csr_in[1:0] as status

usage_guide: |
  Assert csr_in[0] to increment the counter by data_reg_a each clock cycle.
  Assert csr_in[1] to clear the counter to zero.

simulator: "VeriFlow"
simulator_version: "1.0.0"

# =============================================================================
# TILE INFORMATION
# =============================================================================

tile_name: "32-bit Accumulator"
tile_author: "Sebastian Lugo"
top_module: "acc_tile"
version: "1.0.0"

description: |
  32-bit accumulator tile. Adds data_reg_a to an internal register on each
  clock cycle when accumulate is enabled. The accumulator can be cleared
  synchronously via csr_in[1].

ports: |
  csr_in[0]  - accumulate enable (add data_reg_a to accumulator)
  csr_in[1]  - clear accumulator (synchronous, takes priority)
  data_reg_a - value to accumulate (32-bit)
  data_reg_b - unused
  data_reg_c - current accumulator value (32-bit)
  csr_out    - mirrors csr_in[1:0] as status

usage_guide: |
  Assert csr_in[0] to accumulate data_reg_a into the internal register.
  Assert csr_in[1] to synchronously clear the accumulator to zero.
  csr_in[1] takes priority over csr_in[0].
  Read the current accumulated value from data_reg_c.

# =============================================================================
# OPTIONAL
# =============================================================================

simulator: "VeriFlow"
simulator_version: "1.0.0"
